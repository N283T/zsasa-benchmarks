# Tool versions used to plan release-fixed benchmark reruns.
# Keep this file synchronized with final archived manifests.

[zsasa]
policy = "rerun for manuscript evidence"
repository = "https://github.com/N283T/zsasa"
tag = "v0.6.0"
commit = "94fdc1ee0ba27063d7cfe69e915e8425474316e1"
zig = "0.16.0"
binary = "zsasa"
check_args = ["--version"]

[freesasa]
policy = "rerun from pinned Nix comparator build for manuscript benchmarks"
repository = "https://github.com/N283T/freesasa"
upstream = "https://github.com/mittinatten/freesasa"
version = "2.1.3"
commit = "9c9f204fd990ba2f50f47be8d4b96a61355f7a10"
notes = "FreeSASA has no native directory batch mode; directory benchmarks use the tracked freesasa_batch wrapper."
binary = "freesasa"
check_args = ["--version"]

[freesasa_batch]
policy = "rerun tracked wrapper built by Nix against pinned FreeSASA for manuscript benchmarks"
repository = "https://github.com/N283T/zsasa/tree/main/benchmarks/external/freesasa_batch"
source_path = "tools/freesasa_batch/freesasa_batch.cc"
linked_tool = "freesasa"
notes = "Custom batch wrapper around the FreeSASA C API used to generate per-file comparator outputs; Nix builds it from the tracked source against the pinned FreeSASA derivation."
binary = "freesasa_batch"
check_args = []

[rustsasa]
policy = "rerun from pinned Nix comparator build for manuscript benchmarks"
repository = "https://github.com/maxall41/RustSASA"
upstream = "https://github.com/maxall41/RustSASA"
version = "0.9.2-c3c9c4d-timing"
commit = "c3c9c4da021c2d0a8822ca5b8c8b14fede1e6da1"
patch = "nix/patches/rustsasa-add-timing.patch"
notes = "Nix builds upstream RustSASA main at the pinned commit and applies the local --timing patch."
binary = "rust-sasa"
check_args = ["--help"]

[lahuta]
policy = "rerun from pinned Nix comparator build for manuscript benchmarks"
repository = "https://github.com/bisejdiu/lahuta"
version = "2.0.3"
commit = "136411ee6ac797cab84a35d8183e6be6e6a270b2"
binary = "lahuta"
check_args = ["--version"]

[mdtraj]
policy = "rerun native mdtraj trajectory comparator for same-session manuscript evidence"
repository = "https://github.com/mdtraj/mdtraj"
version = "1.11.1.post1"
python_module = "mdtraj"
check_args = []

[mdanalysis]
policy = "runtime dependency for zsasa MDAnalysis wrappers and mdsasa-bolt trajectory runs"
repository = "https://github.com/MDAnalysis/mdanalysis"
version = "2.10.0"
python_module = "MDAnalysis"
check_args = []

[mdsasa_bolt]
policy = "rerun trajectory comparator for same-session manuscript evidence"
repository = "https://github.com/refresh-bio/mdsasa-bolt"
version = "4.0.1"
python_module = "mdsasa_bolt"
check_args = []

[runner]
python = "3.12"
hyperfine = "1.20.0"
uv = "0.11.14"
duckdb_python = "1.5.3"
duckdb_cli = "1.5.2"
