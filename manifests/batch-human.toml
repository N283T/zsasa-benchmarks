# Human batch throughput manifest for same-harness full reruns.

id = "batch-human-full-rerun"
status = "planning"

[dataset]
id = "UP000005640_9606_HUMAN_v6_pdb"
expected_count = 23586
path_or_uri = "$HOME/pdb/afdb/UP000005640_9606_HUMAN_v6/pdb"
role = ["batch-throughput"]

[full_rerun]
source_kind = "full_rerun"
run_id_default = "v0_6_0_full"
n_points = 128
threads = [10]
runs = 3
warmup = 3
precisions = ["f64", "f32"]
prepare = "sync"
rerun_zsasa = true
rerun_comparators = true
output_base = "results/full_rerun/v0_6_0_full/batch/human"
