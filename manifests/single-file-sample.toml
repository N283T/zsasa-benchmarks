# Single-file benchmark subset manifest. Runner redesign is pending.

id = "single-file-stratified-sample"
status = "planning"

[dataset]
path_or_uri = "$HOME/freesasa-zig/benchmarks/dataset/pdb"
expected_count = 2013
role = ["single-file-throughput"]

[subset]
selection = [
  "af-o00175-f1-model_v6",
  "af-a8mxt2-f1-model_v6",
  "af-q6zuj8-f1-model_v6",
  "af-q6zs30-f1-model_v6",
  "9mih",
  "3jc8",
  "7qoi",
  "9mog",
  "9fqr",
  "5vyc",
  "8fon",
  "8rbs",
]
selection_policy = "representative AFDB single-chain, PDB multi-chain cryo-EM scale, maximum structure, and parser/comparator outliers"

[full_rerun]
source_kind = "full_rerun"
run_id_default = "v0_6_0_full"
rerun_zsasa = true
rerun_comparators = true
