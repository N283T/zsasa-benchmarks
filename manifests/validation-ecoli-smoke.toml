# Tracked E. coli smoke validation manifest for end-to-end tool checks.

id = "validation-ecoli-smoke"
description = "Small tracked E. coli AFDB subset for smoke-checking zsasa and comparator runners."

[dataset]
id = "ecoli_smoke_pdb"
name = "Tracked E. coli AFDB smoke subset"
expected_count = 3
redistribution_status = "tracked small AFDB-derived smoke subset"
role = ["smoke", "validation", "approximation"]

[full_rerun]
source_kind = "full_rerun"
run_id_default = "smoke"
threads = 2
output_base = "results/full_rerun/smoke/validation/ecoli_smoke"
rerun_zsasa = true
rerun_comparators = true

[[runs]]
algorithm = "sr"
points_flag = "--n-points"
points = [100]
variants = ["zsasa_f64", "zsasa_f32", "zsasa_bitmask_f64", "zsasa_bitmask_f32"]

[[runs]]
algorithm = "lr"
points_flag = "--n-slices"
points = [20]
variants = ["zsasa_f64", "zsasa_f32"]
