# E. coli static validation manifest for same-harness full reruns.

id = "validation-ecoli-full-rerun"
description = "Run zsasa and comparator validation on the E. coli AlphaFold proteome from pinned tools."

[dataset]
id = "UP000000625_83333_ECOLI_v6_pdb"
name = "AlphaFold E. coli K-12 proteome PDB set"
expected_count = 4370
path_or_uri = "/Users/nagaet/pdb/afdb/UP000000625_83333_ECOLI_v6/pdb"
redistribution_status = "not copied; use local AlphaFold proteome mirror or reconstruct from public AlphaFold proteome source"
role = ["validation", "approximation"]

[full_rerun]
source_kind = "full_rerun"
run_id_default = "v0_6_0_full"
threads = 10
output_base = "results/full_rerun/v0_6_0_full/validation/ecoli"
rerun_zsasa = true
rerun_comparators = true

[[runs]]
algorithm = "sr"
points_flag = "--n-points"
points = [100, 200, 500, 1000]
variants = ["zsasa_f64", "zsasa_f32", "zsasa_bitmask_f64", "zsasa_bitmask_f32"]

[[runs]]
algorithm = "sr"
points_flag = "--n-points"
points = [128]
variants = ["zsasa_f64", "zsasa_f32", "zsasa_bitmask_f64", "zsasa_bitmask_f32"]
note = "128-point SR run is included for Lahuta-compatible comparison."

[[runs]]
algorithm = "lr"
points_flag = "--n-slices"
points = [20]
variants = ["zsasa_f64", "zsasa_f32"]
