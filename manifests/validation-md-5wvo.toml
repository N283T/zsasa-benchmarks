id = "validation-md-5wvo-full-rerun"
status = "planning"

[dataset]
id = "5wvo_C_analysis"
xtc = "$HOME/freesasa-zig/benchmarks/md_data/5wvo_C_analysis/5wvo_C_R1.xtc"
pdb = "$HOME/freesasa-zig/benchmarks/md_data/5wvo_C_analysis/5wvo_C.pdb"
atoms = 3858
frames = 1001
role = ["trajectory-validation"]

[full_rerun]
source_kind = "full_rerun"
run_id_default = "v0_6_0_full"
tools = ["mdtraj", "zsasa_mdtraj", "zsasa_mdanalysis", "zig", "zig_bitmask"]
n_points = [100, 200, 500, 1000]
stride = 1
threads = 10
cli_precisions = ["f64", "f32"]
classifier = "naccess"
include_hydrogens = true
rerun_zsasa = true
rerun_comparators = true
output_base = "results/full_rerun/v0_6_0_full/validation_md/5wvo_C_analysis"
